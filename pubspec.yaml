publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado (BLoC)
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
